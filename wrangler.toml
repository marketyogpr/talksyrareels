name = "talksyra-worker"
main = "src/index.js"
compatibility_date = "2024-09-23"

# Define triggers
[env.production]
name = "talksyra-worker-prod"
routes = [
  { pattern = "api.talksyra.com/*", zone_name = "talksyra.com" }
]

[env.staging]
name = "talksyra-worker-staging"
routes = [
  { pattern = "staging-api.talksyra.com/*", zone_name = "talksyra.com" }
]

# --- R2 BUCKET BINDING ---
[[r2_buckets]]
binding = "MY_R2_BUCKET"
bucket_name = "talksyra-media"
preview_bucket_name = "talksyra-media-preview"

# --- ENVIRONMENT VARIABLES ---
[env.production]
vars = { R2_PUBLIC_DOMAIN = "https://media.talksyra.com" }

[env.staging]
vars = { R2_PUBLIC_DOMAIN = "https://staging-media.talksyra.com" }

# --- ANALYTICS ENGINE ---
[analytics]
enabled = true

# --- LIMITS ---
[limits]
cpu_milliseconds = 50000

# --- BUILD ---
[build]
cwd = "."
command = "npm install"
watch_paths = ["src/**/*.js"]

# --- TRIGGERS ---
[triggers]
crons = []
